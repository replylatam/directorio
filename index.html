<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Directorio de clientes - Reply Latam</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <style>
    /* ── Design Tokens ─────────────────────────────────────────────── */
    :root {
      --bg-1: #080c14;
      --bg-2: #0d1525;
      --surface: rgba(13, 20, 38, 0.72);
      --surface-2: rgba(18, 28, 52, 0.55);
      --stroke: rgba(99, 132, 199, 0.18);
      --stroke-2: rgba(99, 132, 199, 0.10);
      --text: #e8edf5;
      --text-2: #b8c4d8;
      --muted: #6b7fa0;
      --accent: #3d6ef5;
      --accent-glow: rgba(61, 110, 245, 0.28);
      --accent-2: #22d4bf;
      --accent-2-glow: rgba(34, 212, 191, 0.22);
      --danger: #e04040;
      --danger-glow: rgba(224, 64, 64, 0.28);
      --ok: #22c77a;
      --warn: #f0a030;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --font: 'DM Sans', system-ui, sans-serif;
      --font-mono: 'DM Mono', monospace;
      --shadow-card: 0 2px 24px rgba(0,0,0,.45), 0 1px 0 rgba(99,132,199,.08) inset;
      --shadow-btn: 0 4px 16px var(--accent-glow);
    }

    body.light {
      --bg-1: #f0f4fb;
      --bg-2: #e4eaf5;
      --surface: rgba(255, 255, 255, 0.88);
      --surface-2: rgba(235, 241, 255, 0.75);
      --stroke: rgba(80, 110, 190, 0.20);
      --stroke-2: rgba(80, 110, 190, 0.12);
      --text: #111827;
      --text-2: #374151;
      --muted: #5a6b8a;
      --accent: #2455e8;
      --accent-glow: rgba(36, 85, 232, 0.20);
      --accent-2: #0d9b8a;
      --accent-2-glow: rgba(13, 155, 138, 0.18);
      --danger: #cc2828;
      --danger-glow: rgba(204, 40, 40, 0.20);
      --ok: #1aab68;
      --warn: #d97706;
      --shadow-card: 0 2px 20px rgba(50,70,120,.10), 0 1px 0 rgba(255,255,255,.8) inset;
      --shadow-btn: 0 4px 14px var(--accent-glow);
    }

    /* ── Reset & Base ──────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font);
      font-size: 14px;
      line-height: 1.55;
      color: var(--text);
      background:
        radial-gradient(ellipse 800px 600px at 15% -5%, rgba(61,110,245,.18) 0%, transparent 55%),
        radial-gradient(ellipse 700px 500px at 90% 10%, rgba(34,212,191,.12) 0%, transparent 55%),
        radial-gradient(ellipse 500px 400px at 50% 80%, rgba(61,110,245,.07) 0%, transparent 60%),
        linear-gradient(160deg, var(--bg-2) 0%, var(--bg-1) 100%);
      min-height: 100vh;
      padding: clamp(12px, 2.2vw, 24px);
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .container { max-width: 1440px; margin: 0 auto; position: relative; z-index: 1; }

    /* ── Cards ─────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border: 1px solid var(--stroke);
      border-radius: var(--radius-lg);
      padding: clamp(14px, 1.8vw, 20px);
      margin-bottom: 14px;
      box-shadow: var(--shadow-card);
      animation: fadeUp .32s cubic-bezier(.22,.68,0,1.2) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px) scale(.99); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Buttons ───────────────────────────────────────────────────── */
    button, .btn {
      border: none;
      color: #fff;
      padding: 9px 15px;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      letter-spacing: .01em;
      border-radius: var(--radius-sm);
      cursor: pointer;
      background: linear-gradient(145deg, var(--accent), #2548cc);
      transition: transform .16s ease, box-shadow .2s ease, opacity .2s ease, background .2s ease;
      box-shadow: var(--shadow-btn);
      position: relative;
      overflow: hidden;
    }

    button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.10) 0%, transparent 100%);
      pointer-events: none;
    }

    button:hover, .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px var(--accent-glow);
    }

    button:active { transform: translateY(0); }

    button.secondary {
      background: var(--surface-2);
      border: 1px solid var(--stroke);
      color: var(--text-2);
      box-shadow: none;
    }
    button.secondary:hover { background: rgba(61,110,245,.12); color: var(--text); box-shadow: none; }

    button.danger {
      background: linear-gradient(145deg, #e85050, var(--danger));
      box-shadow: 0 4px 16px var(--danger-glow);
    }
    button.danger:hover { box-shadow: 0 8px 24px var(--danger-glow); }

    button.ghost {
      background: transparent;
      border: 1px solid var(--stroke);
      color: var(--muted);
      box-shadow: none;
    }
    button.ghost:hover { border-color: rgba(99,132,199,.45); color: var(--text-2); background: rgba(61,110,245,.06); }

    button:disabled { opacity: .4; cursor: not-allowed; transform: none !important; }

    /* ── Forms ─────────────────────────────────────────────────────── */
    label {
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: .04em;
      color: var(--muted);
      text-transform: uppercase;
      display: block;
      margin: 0 0 5px;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px 13px;
      font-size: 14px;
      font-family: var(--font);
      border-radius: var(--radius-sm);
      border: 1px solid var(--stroke);
      background: rgba(8, 12, 22, 0.55);
      color: var(--text);
      margin-bottom: 10px;
      outline: none;
      transition: border-color .2s ease, box-shadow .2s ease, background .2s ease;
    }

    body.light input, body.light select, body.light textarea {
      background: rgba(255,255,255,.85);
      color: var(--text);
      border-color: var(--stroke);
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
      background: rgba(8, 12, 22, 0.75);
    }

    body.light input:focus, body.light select:focus, body.light textarea:focus {
      background: #fff;
    }

    textarea { min-height: 88px; resize: vertical; }

    select option { background: #111827; color: #e8edf5; }
    body.light select option { background: #f0f4fb; color: #111827; }

    /* ── Layout Helpers ────────────────────────────────────────────── */
    .small { font-size: 12px; color: var(--muted); }
    .row { display: flex; gap: 10px; flex-wrap: wrap; }
    .row > * { flex: 1 1 220px; }
    .inline { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 14px; align-items: stretch; }
    @media (min-width: 980px) { .grid { grid-template-columns: 1.2fr .9fr; } }

    /* ── Badges ────────────────────────────────────────────────────── */
    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 999px;
      border: 1px solid var(--stroke);
      letter-spacing: .02em;
    }
    .badge.ok  { color: #6ee8aa; border-color: rgba(34,199,122,.40); background: rgba(34,199,122,.12); }
    .badge.off { color: #faa5a5; border-color: rgba(224,64,64,.40);  background: rgba(224,64,64,.12); }

    /* ── Search ────────────────────────────────────────────────────── */
    .searchWrap { position: relative; }
    .searchWrap input { padding-left: 36px; margin: 0; }
    .searchWrap::before { content: '🔎'; position: absolute; left: 11px; top: 9px; opacity: .5; font-size: 13px; }

    /* ── KPI Grid ──────────────────────────────────────────────────── */
    .kpiGrid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .kpiGrid.singleRow { grid-template-columns: repeat(5, minmax(0, 1fr)) !important; }
    @media (max-width: 900px) { .kpiGrid { grid-template-columns: repeat(2, minmax(0, 1fr)); } }

    .kpi {
      padding: 14px 16px;
      border: 1px solid var(--stroke);
      border-radius: var(--radius-md);
      background: var(--surface-2);
      position: relative;
      overflow: hidden;
    }
    .kpi::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      opacity: .6;
    }
    .kpi .label { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; font-weight: 600; }
    .kpi .value { font-size: 24px; font-weight: 700; margin-top: 5px; color: var(--text); }

    /* ── Feed Items ────────────────────────────────────────────────── */
    .feedItem {
      padding: 11px 13px;
      border: 1px solid var(--stroke-2);
      border-radius: var(--radius-md);
      background: var(--surface-2);
      margin-bottom: 8px;
      transition: border-color .2s ease, background .2s ease;
    }
    .feedItem:hover { border-color: var(--stroke); }
    .feedTop { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .feedType { font-weight: 600; font-size: 13.5px; }
    .feedMeta { font-size: 12px; color: var(--muted); margin-top: 3px; }

    /* ── Comments ──────────────────────────────────────────────────── */
    .commentsSection {
      margin-top: 14px;
      border-top: 1px solid var(--stroke-2);
      padding-top: 14px;
      background: rgba(8,12,22,.2);
      padding: 14px;
      border-radius: var(--radius-md);
    }
    .commentItem {
      padding: 12px 14px;
      border: 1px solid var(--stroke);
      border-radius: var(--radius-md);
      background: rgba(8, 12, 22, 0.35);
      margin-bottom: 10px;
      transition: border-color .18s ease;
    }
    .commentItem:hover { border-color: rgba(99,132,199,.32); }
    .commentHead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .commentActions { display: flex; gap: 8px; align-items: center; font-size: 12px; color: var(--muted); }
    .commentBody { margin-top: 5px; line-height: 1.6; }
    .commentFooter { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; gap: 8px; }
    .commentDeleteText { font-size: 12px; color: var(--muted); cursor: pointer; text-decoration: underline; background: none; border: none; padding: 0; box-shadow: none; }
    .commentDeleteText:hover { color: var(--danger); }
    .commentsHeader { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .commentsTitle { font-size: 20px; font-weight: 700; }
    .activityTabs { display: flex; gap: 6px; align-items: center; margin-bottom: 12px; }
    .activityTab { padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--stroke); background: transparent; color: var(--text-2); cursor: pointer; font-size: 13px; font-family: var(--font); transition: all .18s; }
    .activityTab:hover { background: rgba(61,110,245,.08); }
    .activityTab.active { background: rgba(61,110,245,.18); border-color: rgba(61,110,245,.50); color: #a5bfff; }
    .commentComposer { margin-top: 10px; border: 1px solid var(--stroke); border-radius: var(--radius-md); padding: 12px; background: rgba(8,12,22,.3); }

    /* ── Toggle Switch ─────────────────────────────────────────────── */
    .switchWrap { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); }
    .switch { position: relative; display: inline-block; width: 42px; height: 24px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; cursor: pointer; inset: 0; background: rgba(80,100,140,.5); border-radius: 999px; transition: .22s; border: 1px solid var(--stroke); }
    .slider::before { content: ""; position: absolute; height: 18px; width: 18px; left: 2px; top: 2px; background: white; border-radius: 50%; transition: .22s; box-shadow: 0 1px 4px rgba(0,0,0,.3); }
    .switch input:checked + .slider { background: linear-gradient(135deg, var(--accent), #2548cc); border-color: transparent; }
    .switch input:checked + .slider::before { transform: translateX(18px); }

    /* ── Avatars ───────────────────────────────────────────────────── */
    .commentAvatar { width: 28px; height: 28px; border-radius: 999px; object-fit: cover; border: 2px solid var(--stroke); margin-right: 8px; }
    .commentHeadLeft { display: flex; align-items: center; }
    .assignedAvatarRow { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
    .assignedAvatar { width: 24px; height: 24px; border-radius: 999px; object-fit: cover; border: 2px solid var(--stroke); }

    /* ── Misc UI ───────────────────────────────────────────────────── */
    .sortBtn { padding: 6px 10px; }
    .commentItem.internal { border-color: rgba(240,192,60,.55); background: rgba(240,192,60,.10); }
    .internalBadge { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: rgba(240,192,60,.22); color: #fde68a; border: 1px solid rgba(240,192,60,.55); margin-left: 8px; }
    .attachBtn { width: 38px; height: 38px; display: inline-flex; align-items: center; justify-content: center; padding: 0; font-size: 16px; }
    .attachInput { display: none; }
    .ticket.dragging { opacity: .4; transform: scale(.97); }
    .column.dropTarget { outline: 2px dashed rgba(61,110,245,.7); outline-offset: 3px; }
    .commentItem.maximumAttention { border-color: rgba(224,64,64,.65); background: rgba(224,64,64,.14); }
    .attentionBadge { font-size: 11px; padding: 2px 8px; border-radius: 999px; background: rgba(224,64,64,.22); color: #fecaca; border: 1px solid rgba(224,64,64,.55); margin-left: 8px; }
    .commentToolbar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .colorBtn { width: 34px; height: 30px; border-radius: var(--radius-sm); border: 1px solid var(--stroke); display: inline-flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background: linear-gradient(135deg, #ef4444, #f59e0b, #22c55e, #3b82f6, #8b5cf6); }
    .colorBtn span { font-weight: 800; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.5); }
    .colorBtn input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .timeBox { margin-top: 10px; padding: 12px; border: 1px solid var(--stroke); border-radius: var(--radius-md); background: rgba(8,12,22,.25); }
    .helpIcon { width: 24px; height: 24px; border-radius: 999px; display: inline-flex; align-items: center; justify-content: center; font-weight: 700; padding: 0; }
    .timerLive { font-size: 12px; color: var(--muted); margin-top: 6px; font-family: var(--font-mono); }
    .readTick { font-weight: 700; color: var(--muted); margin-left: 4px; }
    .readTick.read { color: var(--accent); }
    .commentEditor { min-height: 90px; border: 1px solid var(--stroke); border-radius: var(--radius-sm); padding: 10px 12px; background: rgba(8,12,22,.4); outline: none; font-family: var(--font); font-size: 14px; color: var(--text); transition: border-color .2s, box-shadow .2s; }
    .commentEditor:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .commentEditor:empty::before { content: attr(data-placeholder); color: var(--muted); }
    .commentBody.formatted p { margin: .25rem 0; }
    .commentBody.formatted ul { margin: .25rem 0 .25rem 1.25rem; }

    /* ── Priority / Urgent flags ───────────────────────────────────── */
    .urgentTopFlag {
      display: inline-block;
      background: linear-gradient(135deg, #c41818, #e04040);
      color: #fff;
      padding: 5px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 12px;
      box-shadow: 0 6px 20px rgba(224,64,64,.42);
      letter-spacing: .02em;
    }
    .urgentFlag { font-size: 11px; color: #fca5a5; margin-top: 6px; }
    .urgentBtn { background: linear-gradient(135deg, #f59e0b, #e04040); box-shadow: 0 4px 16px rgba(224,64,64,.35); }

    /* ── Ticket Detail Layout ──────────────────────────────────────── */
    .detailLayout { display: grid; grid-template-columns: 1fr; gap: 14px; }
    .codeBadge {
      display: inline-block;
      background: rgba(61,110,245,.18);
      color: #93b4ff;
      padding: 5px 11px;
      border-radius: var(--radius-sm);
      font-weight: 700;
      border: 1px solid rgba(61,110,245,.38);
      font-family: var(--font-mono);
      font-size: 12px;
      letter-spacing: .03em;
    }
    @media (min-width: 980px) {
      .detailLayout.withSidebar { grid-template-columns: 1.55fr .55fr; }
      .detailSidebar { border-left: 1px solid var(--stroke); padding-left: 14px; }
    }

    /* ── Light mode overrides ──────────────────────────────────────── */
    body.light .ticket, body.light .column, body.light .feedItem, body.light .commentItem {
      background: rgba(255,255,255,.88);
      color: var(--text);
      border-color: rgba(80,110,190,.22);
      box-shadow: 0 2px 16px rgba(50,70,120,.08);
    }
    body.light .ticket .meta, body.light .small, body.light .feedMeta, body.light label { color: var(--muted); }
    body.light .column h4 { color: var(--text-2); }
    body.light .detailSidebar { background: rgba(230,238,255,.70); border-radius: var(--radius-md); padding: 14px; }
    body.light .codeBadge { background: rgba(36,85,232,.15); color: #1c3cb0; border-color: rgba(36,85,232,.30); }
    body.light .commentItem.internal, body.light .commentItem.maximumAttention { color: var(--text); }
    body.light .commentItem.internal .commentBody, body.light .commentItem.maximumAttention .commentBody,
    body.light .commentItem.internal strong, body.light .commentItem.maximumAttention strong { color: var(--text); }
    body.light .commentEditor { background: rgba(255,255,255,.85); }
    body.light .commentsSection { background: rgba(230,238,255,.35); }

    /* ── Kanban Board ──────────────────────────────────────────────── */
    .boardWrap { overflow-x: auto; overflow-y: visible; padding-bottom: 6px; }
    .board { display: grid; grid-template-columns: repeat(5, minmax(260px, 1fr)); gap: 14px; overflow: visible; align-items: start; }

    .column {
      background: var(--surface-2);
      border: 1px solid var(--stroke);
      border-radius: var(--radius-md);
      padding: 12px;
      min-height: 220px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .column h4 {
      margin: 0 0 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: .08em;
    }

    .ticket {
      background: var(--surface);
      border: 1px solid var(--stroke);
      border-radius: var(--radius-sm);
      padding: 11px 12px 11px 15px;
      margin-bottom: 8px;
      border-left: 3px solid rgba(99,132,199,.4);
      transition: transform .16s ease, box-shadow .2s ease, border-color .2s ease;
      cursor: pointer;
    }
    .ticket:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.3); border-color: rgba(99,132,199,.35); }

    .ticket.problemFlag { border-left-color: var(--danger) !important; background: rgba(224,64,64,.12); }
    .ticket.priorityAlta  { border-left-color: var(--danger); }
    .ticket.priorityMedia { border-left-color: var(--warn); }
    .ticket.priorityBaja  { border-left-color: var(--ok); }

    .ticket h5 { margin: 0 0 7px; font-size: 13.5px; font-weight: 600; line-height: 1.4; }
    .ticketCode { font-size: 11px; color: var(--muted); font-weight: 600; margin-right: 6px; font-family: var(--font-mono); letter-spacing: .03em; }
    .ticketCode.clickable { cursor: pointer; text-decoration: underline dotted; }
    .deadline { color: #f87171; font-weight: 600; }
    .ticket p { margin: 0 0 7px; font-size: 13px; color: var(--text-2); }
    .ticket .meta { font-size: 11px; color: var(--muted); }

    /* ── Modal ─────────────────────────────────────────────────────── */
    .modalBack {
      position: fixed;
      inset: 0;
      background: rgba(5, 8, 18, 0.72);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 99;
    }
    .modal {
      width: min(1140px, 100%);
      max-height: 90vh;
      overflow: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--stroke) transparent;
    }
    .modal::-webkit-scrollbar { width: 5px; }
    .modal::-webkit-scrollbar-thumb { background: var(--stroke); border-radius: 99px; }

    .hidden { display: none !important; }

    /* ── Toast ─────────────────────────────────────────────────────── */
    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 120;
      min-width: 260px;
      max-width: 420px;
      padding: 11px 15px;
      border-radius: var(--radius-md);
      border: 1px solid var(--stroke);
      background: rgba(10, 16, 32, 0.96);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 32px rgba(0,0,0,.45);
      font-size: 13.5px;
      font-weight: 500;
      animation: toastIn .22s cubic-bezier(.22,.68,0,1.2);
    }
    @keyframes toastIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:none; } }
    .toast.ok    { border-color: rgba(34,199,122,.55); }
    .toast.error { border-color: rgba(224,64,64,.55); }

    /* ── Ticket List View ──────────────────────────────────────────── */
    .ticketListWrap {
      border: 1px solid var(--stroke);

function base32ToUint8(base32){
  const alphabet="ABCDEFGHIJKLMNOPQRSTUVWXYZ234567"
  let bits="",result=[]
  base32=(base32||"").replace(/=+$/,"").replace(/\s+/g,"").toUpperCase()
  for(let i=0;i<base32.length;i++){
    const val = alphabet.indexOf(base32[i])
if(val===-1){
  throw new Error("SECRET no es Base32 válido: " + base32)
}
    bits+=val.toString(2).padStart(5,"0")
  }
  for(let i=0;i+8<=bits.length;i+=8){result.push(parseInt(bits.substring(i,i+8),2))}
  return new Uint8Array(result)
}

async function generateTOTP(secret){
  try{
    const key=await crypto.subtle.importKey("raw",base32ToUint8(secret),{name:"HMAC",hash:"SHA-1"},false,["sign"])
    const epoch=Math.floor(Date.now()/1000)
    const time=Math.floor(epoch/30)
    const buffer=new ArrayBuffer(8)
    const view=new DataView(buffer)
    view.setUint32(4,time)
    const hmac=await crypto.subtle.sign("HMAC",key,buffer)
    const bytes=new Uint8Array(hmac)
    const offset=bytes[bytes.length-1]&0xf
    const code=((bytes[offset]&0x7f)<<24)|((bytes[offset+1]&0xff)<<16)|((bytes[offset+2]&0xff)<<8)|(bytes[offset+3]&0xff)
    return (code%1000000).toString().padStart(6,"0")
  }catch(err){
    console.warn("Error generando TOTP:", err)
    return "SECRET inválido"
  }
}

  await loadAreaOptions()
  if(currentRole==="admin") loadUsersAdmin()
  alert("Área creada")

function normalizeAreaName(value){
  return String(value||"").trim().toUpperCase()
}

async function getAreaNames(){
  const snap=await db.ref("areas").once("value")
  const raw=snap.val()||{}
  const names=[]

  Object.entries(raw).forEach(([key,val])=>{
    if(typeof val==="string"){
      const n=normalizeAreaName(val)
      if(n) names.push(n)
      return
    }

    if(val && typeof val==="object"){
      const fromName=normalizeAreaName(val.name||val.area||val.label)
      if(fromName){
        names.push(fromName)
      }else{
        const fromKey=normalizeAreaName(key)
        if(fromKey) names.push(fromKey)
      }
    }
  })

  const unique=[...new Set(names)].sort()
  if(isAreaScopedAdmin()) return unique.filter((a)=>a===normalizeAreaName(currentUser?.area||""))
  return unique
}

function fillAreaSelect(selectId, areas, selected=""){

  if(!el) return
  el.innerHTML='<option value="">Sin área</option>' + areas.map(a=>`<option value="${htmlEscape(a)}">${htmlEscape(a)}</option>`).join("")
  const normalized=normalizeAreaName(selected)
  el.value=normalized
  if(el.value!==normalized) el.value=""
}

async function loadAreaOptions(selectedUserArea="", selectedClientArea=""){
  const areas=await getAreaNames()
  fillAreaSelect("uArea", areas, selectedUserArea)
  fillAreaSelect("cArea", areas, selectedClientArea)

  return currentRole==="admin" && normalizeAreaName(currentUser?.area||"")!==""

function canAdminSeeArea(areaValue){
  if(!isAreaScopedAdmin()) return true
  return normalizeAreaName(areaValue)===normalizeAreaName(currentUser?.area||"")

function canSeeClientByArea(client){
  if(currentRole==="admin") return canAdminSeeArea(client?.area||"")
  const userArea=(currentUser?.area||"").trim().toUpperCase()
  if(!userArea) return true

  const clientArea=(client?.area||"").trim().toUpperCase()
  const clientName=(client?.clientName||client?.name||"").trim().toUpperCase()

  if(clientArea) return clientArea===userArea
  return clientName.includes(userArea)
}

                ${currentRole==="admin"?`<td><label class="switch"><input type="checkbox" ${c.active?"checked":""} onchange="toggleClientSwitch('${id}', this.checked)"><span class="slider"></span></label></td>
                <td><div class="inline"><button class="ghost" onclick="openClientModal('edit','${id}')">Editar</button><button class="danger" onclick="deleteClient('${id}', '${String(clientName||"").replace(/'/g,"\\'")}')">Borrar</button><button class="warn" onclick="markClientAlert('${id}','${String(clientName||"").replace(/'/g,"\\'")}')">🚨</button></div></td>`:

function attachTotpLive(id,c){
  clearTotpInterval(id)

  const codeId=`code-${id}`; const timerId=`timer-${id}`
  function updateTimer(){
    const seconds=30-(Math.floor(Date.now()/1000)%30)
    const el=document.getElementById(timerId)
    if(el) el.innerText=seconds

    if(currentRole!=="admin" && seconds===1){
      setTimeout(()=>{
        clearTotpInterval(id)
        delete revealedTotpByClient[id]
        const codeEl=document.getElementById(codeId)
        const timerEl=document.getElementById(timerId)
        if(codeEl) codeEl.innerText="Presioná Obtener"
        if(timerEl) timerEl.innerText="-"
        loadClients()
      },1000)
    }
  }
  async function updateCode(){const el=document.getElementById(codeId); if(!el) return; if(!c.secret){el.innerText="Sin secret"; return} el.innerText=await generateTOTP(c.secret)}
  updateTimer(); updateCode()
  const timerInterval=setInterval(updateTimer,1000)
  const codeInterval=setInterval(()=>{if(Math.floor(Date.now()/1000)%30===0) updateCode()},1000)
  totpIntervalsById[id]={timerInterval,codeInterval}
}

async function revealTotp(clientId, clientName){
  const expiresAt=(Math.floor(Date.now()/30000)+1)*30000
  revealedTotpByClient[clientId]={expiresAt}

  const codeEl=document.getElementById(`code-${clientId}`)
  const timerEl=document.getElementById(`timer-${clientId}`)
  if(codeEl) codeEl.innerText="Generando..."
  if(timerEl) timerEl.innerText="30"

  const clientData=clientsCache[clientId]
  if(clientData) attachTotpLive(clientId, clientData)
  // si querés, podés NO llamar loadClients() acá y evitar re-render (más rápido todavía)
  loadClients()

  logActivity("totp_obtener",{clientId,clientName}).catch(()=>{})
}

function normalizeBase32Secret(s){
  return (s || "")
    .trim()
    .replace(/\s+/g, "")
    .toUpperCase()
    .replace(/=+$/g, ""); // opcional: sacá padding final
}

function isValidBase32(s){
  // Base32 RFC4648: A-Z y 2-7 (sin 0,1,8,9)
  return /^[A-Z2-7]+$/.test(s);
}

async function extractSecret(){
  const file=document.getElementById("qrFile")?.files?.[0]
  if(!file) return alert("Seleccioná una imagen QR")

  const reader=new FileReader()
  reader.onload=function(e){
    const img=new Image()
    img.onload=function(){
      const canvas=document.createElement("canvas")
      canvas.width=img.width
      canvas.height=img.height
      const ctx=canvas.getContext("2d")
      ctx.drawImage(img,0,0)

      const imageData=ctx.getImageData(0,0,canvas.width,canvas.height)
      const qr=jsQR(imageData.data,canvas.width,canvas.height)
      if(!qr) return alert("No se pudo leer el QR")

      let secret = null

      try{
        // Soporta otpauth://... aunque sea un esquema custom
        const url = new URL(qr.data)
        secret = url.searchParams.get("secret")
      }catch(_){
        // Fallback si no parsea como URL
        const m = String(qr.data).match(/[?&]secret=([^&]+)/i)
        secret = m ? m[1] : null
      }

      if(!secret) return alert("No se encontró SECRET en el QR")

      // decode por si viene URL-encoded
      try{ secret = decodeURIComponent(secret) }catch(_){}

      secret = normalizeBase32Secret(secret)

      if(!isValidBase32(secret)){
        document.getElementById("secretPreview").innerText =
          "SECRET inválido detectado (tiene caracteres raros): " + secret
        return alert("El SECRET extraído no es Base32 válido. Revisá el QR / fuente.")
      }

      extractedSecret = secret
      document.getElementById("secretPreview").innerText="SECRET detectado: "+extractedSecret
    }
    img.src=e.target.result
  }
  reader.readAsDataURL(file)
}

async function saveClient(){
  const clientName=document.getElementById("cClientName").value.trim()
  const password=document.getElementById("cPassword").value.trim()
  const country=document.getElementById("cCountry").value.trim()
  const email=document.getElementById("cEmail").value.trim().toLowerCase()
  const notes=document.getElementById("cNotes").value.trim()
  let area=(document.getElementById("cArea")?.value||"").trim().toUpperCase()
  if(isAreaScopedAdmin()) area=normalizeAreaName(currentUser?.area||"")
  const noQr=document.getElementById("cNoQr").checked

  if(!clientName||!password||!country||!email) return alert("Completá Cliente, Contraseña, País y Email")

  // secret final:
  // - si noQr => null (sin TOTP)
  // - si subieron QR y extrajeron => extractedSecret
  // - si están editando y no subieron QR => mantener existingSecret
  let finalSecret = null

  if(noQr){
    finalSecret = null
  }else{
    finalSecret = extractedSecret || existingSecret || null
    if(!finalSecret){
      return alert("Cargá QR y extraé SECRET, o activá 'Cargar sin QR'.")
    }
  }

  const baseData = {
    clientName,
    name:clientName,
    password,
    country,
    email,
    notes,
    area,
    secret: finalSecret
  }

  if(modalMode==="edit" && editingClientId){
    await db.ref("clients").child(editingClientId).update({
      ...baseData,
      updatedAt:new Date().toISOString(),
      updatedBy:currentUser.email
    })
    alert("Cliente actualizado correctamente")
  }else{
    await db.ref("clients").push({
      ...baseData,
      active:true,
      createdAt:new Date().toISOString(),
      createdBy:currentUser.email
    })
    alert("Cliente creado correctamente")
  }

  closeClientModal()
}

async function postSlackMessage(text, threadTs=""){
  if(SLACK_BOT_TOKEN && SLACK_CHANNEL_ID){
    try{
      const payload={channel:SLACK_CHANNEL_ID,text}
      if(threadTs) payload.thread_ts=threadTs

      const res=await fetch("https://slack.com/api/chat.postMessage",{
        method:"POST",
        headers:{"Content-Type":"application/json","Authorization":`Bearer ${SLACK_BOT_TOKEN}`},
        body:JSON.stringify(payload)
      })

      const data=await res.json()
      if(data.ok) return {ok:true,ts:data.ts}
      console.warn("Slack API devolvió error:", data)
      return {ok:false,error:data.error||"slack_api_error"}
    }catch(err){
      console.warn("No se pudo notificar a Slack por API:", err)
      return {ok:false,error:String(err)}
    }
  }

  if(SLACK_WEBHOOK_URL){
    try{
      await fetch(SLACK_WEBHOOK_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({text})})
      return {ok:true,ts:null}
    }catch(err){
      console.warn("No se pudo notificar a Slack por webhook:", err)
      return {ok:false,error:String(err)}
    }
  }

  return {ok:false,error:"no_slack_config"}
}

function jsonp(url){
  return new Promise((resolve,reject)=>{
    const cb="cb_"+Math.random().toString(36).slice(2)
    const s=document.createElement("script")
    const timeout=setTimeout(()=>{
      cleanup()
      reject(new Error("JSONP timeout"))
    },8000)

    function cleanup(){
      clearTimeout(timeout)
      delete window[cb]
      if(s.parentNode) s.parentNode.removeChild(s)
    }

    window[cb]=(data)=>{ cleanup(); resolve(data) }

    s.src = url + (url.includes("?") ? "&" : "?") + "callback=" + cb
    s.onerror=()=>{ cleanup(); reject(new Error("JSONP error")) }
    document.body.appendChild(s)
  })
}

    })
    const el = document.getElementById("kpiTotalClients")
if(el) el.innerText = total
    const elA = document.getElementById("kpiActiveClients")
if(elA) elA.innerText = active
const elI = document.getElementById("kpiInactiveClients")
if(elI) elI.innerText = inactive

  }catch(_){}

  // KPIs: alertas abiertas
  try{
    const alertsSnap = await db.ref("client_alerts").once("value")
    const alerts = alertsSnap.val() || {}
    const open = Object.values(alerts).filter(a=>a && a.status!=="resolved").length
    const elOpen = document.getElementById("kpiOpenAlerts")
if(elOpen) elOpen.innerText = open
  }catch(_){}

  // KPIs: operadores + último acceso
try{
  const usersSnap = await db.ref("users_by_email").once("value")
  const users = Object.values(usersSnap.val() || {})
  const ops = users.filter(u=>u && u.role==="operator")

  const elOps = document.getElementById("kpiOperators")
  if(elOps) elOps.innerText = ops.length

  const last = ops
    .map(u=>u.lastAccessAt ? new Date(u.lastAccessAt).getTime() : 0)
    .sort((a,b)=>b-a)[0] || 0

  const elLast = document.getElementById("kpiLastAccess")
  if(elLast) elLast.innerText = last ? new Date(last).toLocaleString() : "Sin accesos"
}catch(_){}

  // Actividad reciente desde Sheets (JSONP)
  const container = document.getElementById("recentActivity")
  if(container) container.innerHTML = `<p class="small">Cargando actividad…</p>`

  try{
    const url = `${SHEETS_WEBHOOK_URL}?action=recent&limit=10`
    const res = await jsonp(url)
    const items = (res && res.ok && Array.isArray(res.items)) ? res.items : []

    if(!items.length){
      container.innerHTML = `<p class="small">Sin actividad reciente.</p>`
      return
    }

    container.innerHTML = items.map(it=>{
      const who = it.email || "sin-usuario"
      const when = it.timestampIso ? formatWhen(it.timestampIso) : (it.timestampLocal || "")
      const extra = it.clientName ? ` · ${htmlEscape(it.clientName)}` : ""
      return `
        <div class="feedItem">
          <div class="feedTop">
            <div>
              <div class="feedType">${htmlEscape(it.eventType || "evento")}${extra}</div>
              <div class="feedMeta">${htmlEscape(who)} · ${htmlEscape(when)}</div>
            </div>
            <span class="badge ${it.role==="admin"?"ok":"warn"}">${htmlEscape(it.role||"-")}</span>
          </div>
        </div>
      `
    }).join("")
  }catch(err){
    console.warn("No se pudo leer actividad reciente:", err)
    if(container) container.innerHTML = `<p class="small">No se pudo cargar la actividad reciente.</p>`
  }
}
 
  
async function init(){
  renderLogin()

  if(!initFirebase()){
    const app=document.getElementById("app")
    if(app){
      app.innerHTML=`
        <div class="card" style="max-width:560px;margin:40px auto">
          <h2 style="margin-top:0">No se pudo iniciar la app</h2>
          <p class="small">No cargó Firebase. Revisá conexión, extensiones de bloqueo o configuración del navegador.</p>
        </div>`
    }
    return
  }

  await ensureSuperAdmin()
}
init()
</script>
